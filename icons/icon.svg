  <!-- Block symbol (circle with slash) -->
  <circle cx="64" cy="60" r="18" fill="none" stroke="#667eea" stroke-width="4"/>
  <line x1="52" y1="48" x2="76" y2="72" stroke="#667eea" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Small "AD" text blocked -->
  <text x="64" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" 
        fill="#667eea" text-anchor="middle" opacity="0.4">AD</text>
